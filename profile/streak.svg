<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">
<defs>
<linearGradient id="bg" x1="0" x2="1">
<stop offset="0%" stop-color="#07111f"/>
<stop offset="100%" stop-color="#12071f"/>
</linearGradient>
<linearGradient id="ring" x1="0" x2="1">
<stop offset="0%" stop-color="#21d4fd"/>
<stop offset="100%" stop-color="#b721ff"/>
</linearGradient>
<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="3" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect x="2" y="2" width="491" height="191" rx="18" fill="url(#bg)" stroke="url(#ring)" stroke-width="2"/>

<line x1="165" y1="25" x2="165" y2="170" stroke="#284a77"/>
<line x1="330" y1="25" x2="330" y2="170" stroke="#4c2a77"/>

<g text-anchor="middle" font-family="Segoe UI,Arial,sans-serif">
<text x="82.5" y="55" font-size="48" font-weight="700" fill="#fff">256</text>
<text x="82.5" y="95" font-size="16" fill="#2fe7ff">Total Contributions</text>
<text x="82.5" y="135" font-size="12" fill="#b7c5d3">📅 Jan 1 - Present</text>

<circle cx="247.5" cy="78" r="55" fill="none" stroke="#1b2235" stroke-width="8"/>
<circle cx="247.5" cy="78" r="55" fill="none" stroke="url(#ring)" stroke-width="8"
stroke-linecap="round" stroke-dasharray="260 1000" transform="rotate(-90 247.5 78)"
filter="url(#glow)">
<animate attributeName="stroke-dasharray" values="0 1000;260 1000;0 1000" dur="5s" repeatCount="indefinite"/>
</circle>
<text x="247.5" y="28" font-size="28">🔥
<animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="1s" repeatCount="indefinite"/>
</text>
<text x="247.5" y="88" font-size="52" font-weight="700" fill="#fff">32</text>
<text x="247.5" y="118" font-size="16" fill="#dd7cff">Current Streak</text>
<text x="247.5" y="145" font-size="12" fill="#b7c5d3">📅 Jul 7</text>

<text x="412.5" y="55" font-size="48" font-weight="700" fill="#fff">87</text>
<text x="412.5" y="95" font-size="16" fill="#d25cff">Longest Streak</text>
<text x="412.5" y="135" font-size="12" fill="#b7c5d3">📅 May 20</text>
</g>

<circle cx="20" cy="20" r="2" fill="#21d4fd">
<animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="475" cy="175" r="2" fill="#b721ff">
<animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
</circle>
</svg>
